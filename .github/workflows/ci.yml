name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 10
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run coverage
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json
          retention-days: 7

  publish-badge:
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-summary
          path: coverage
      - name: Publish coverage badge
        run: |
          PCT=$(node -e "console.log(Math.round(require('./coverage/coverage-summary.json').total.statements.pct))")
          COLOR=$(node -e "const p=$PCT; console.log(p>=80?'brightgreen':p>=60?'yellow':'red')")
          mkdir -p /tmp/badge
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}' "$PCT" "$COLOR" > /tmp/badge/coverage.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin badges || true
          if git ls-remote --exit-code --heads origin badges > /dev/null; then
            git checkout badges
          else
            git checkout --orphan badges
            git rm -rf . > /dev/null 2>&1 || true
          fi
          cp /tmp/badge/coverage.json coverage.json
          git add coverage.json
          git diff --cached --quiet || git commit -m "Update coverage badge"
          git push origin badges
